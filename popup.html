<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      overflow-y: scroll; /* always reserve scrollbar space so width never shifts */
      scrollbar-width: none; /* Firefox — hide scrollbar visually */
    }

    html::-webkit-scrollbar {
      display: none; /* Chrome — hide scrollbar visually */
    }

    body {
      width: 400px;
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #181818;
      color: #ffffff;
      min-height: 500px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* HEADER */
    .header {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0E172A;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 9px;
      color: #fff;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 20px 0;
    }
    .tab-btn {
      background: none;
      border: none;
      color: #888;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }
    .tab-btn:hover { color: #999; background: #252525; }
    .tab-btn.active { color: #fff; background: #2a2a2a; }

    /* DIVIDER */
    .divider { height: 1px; background: #2a2a2a; margin: 12px 20px 0; }

    /* PANELS */
    .panel { display: none; padding: 16px 20px 20px; }
    .panel.active { display: block; }

    /* SECTION LABEL */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    /* HISTORY SECTION LABEL */
    .history-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 14px 0 8px;
    }
    .history-section-label:first-child { margin-top: 0; }

    /* CARDS */
    .card {
      background: #212121;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* EMPTY STATE */
    .empty-state {
      padding: 28px 20px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }
    .empty-icon { font-size: 24px; margin-bottom: 6px; }

    /* ACTIVE SESSION ITEM */
    .session-item {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid #2c2c2c;
      gap: 12px;
    }
    .session-item:last-child { border-bottom: none; }
    .session-favicon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: #2a2a2a;
      object-fit: contain;
      flex-shrink: 0;
    }
    .session-info { flex: 1; min-width: 0; }
    .session-domain {
      font-size: 13px; font-weight: 600; color: #fff;
    }
    .session-intention {
      font-size: 11px; color: #888; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .timer-badge {
      font-size: 12px; font-weight: 600; color: #888;
      background: #2a2a2a; padding: 4px 9px;
      border-radius: 20px; font-variant-numeric: tabular-nums;
    }
    .btn-done {
      width: 28px; height: 28px;
      background: #10b981; border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .btn-done:hover { background: #059669; }
    .btn-done svg { width: 13px; height: 13px; fill: #fff; }

    /* HISTORY ITEM */
    .history-item {
      display: flex; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid #2c2c2c; gap: 12px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-favicon {
      width: 24px; height: 24px; border-radius: 6px;
      background: #2a2a2a; object-fit: contain; flex-shrink: 0;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-domain { font-size: 12px; font-weight: 600; color: #e0e0e0; }
    .history-intention {
      font-size: 11px; color: #777; margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-date { font-size: 10px; color: #666; margin-top: 2px; }
    .history-duration { font-size: 12px; font-weight: 600; color: #888; flex-shrink: 0; }

    .clear-row {
      display: flex; justify-content: flex-end; margin-bottom: 10px;
    }
    .btn-clear {
      background: none; border: none; color: #ff4444;
      font-family: inherit; font-size: 11px; font-weight: 600;
      cursor: pointer; padding: 0;
      opacity: 0.7; transition: opacity 0.15s;
    }
    .btn-clear:hover { opacity: 1; }

    /* ── SETTINGS ── */
    .settings-section { margin-bottom: 24px; }

    /* Domain list */
    .domain-list { display: flex; flex-direction: column; gap: 2px; }
    .domain-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: #212121; border: 1px solid #2a2a2a; border-radius: 10px;
      transition: border-color 0.15s;
    }
    .domain-item:hover { border-color: #2a2a2a; }
    .domain-favicon {
      width: 18px; height: 18px; border-radius: 4px;
      background: #2a2a2a; object-fit: contain; flex-shrink: 0;
    }
    .domain-name { flex: 1; font-size: 13px; color: #e0e0e0; font-weight: 500; }
    .btn-remove {
      background: none; border: none; cursor: pointer;
      color: #666; font-size: 16px; line-height: 1;
      transition: color 0.15s; padding: 2px 4px; border-radius: 4px;
    }
    .btn-remove:hover { color: #e74c3c; background: #1e1010; }

    /* Add domain row */
    .add-row {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .add-input {
      flex: 1;
      background: #212121; border: 1px solid #2a2a2a;
      color: #fff; font-family: inherit; font-size: 13px;
      padding: 10px 14px; border-radius: 10px; outline: none;
      transition: border-color 0.2s;
    }
    .add-input::placeholder { color: #666; }
    .add-input:focus { border-color: #666; }
    .btn-add {
      background: #fff; color: #000;
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      padding: 10px 16px; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-add:hover { background: #ddd; }

    .hint-text {
      font-size: 11px; color: #666; margin-top: 8px; line-height: 1.5;
    }

    /* ALERT GLOW SETTINGS */
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px;
      background: #212121; border: 1px solid #2a2a2a; border-radius: 12px;
      margin-bottom: 8px;
    }
    .setting-label { font-size: 13px; font-weight: 600; color: #e0e0e0; }
    .setting-sub { font-size: 11px; color: #666; margin-top: 2px; }

    /* Toggle switch */
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #333; border-radius: 99px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #10b981; }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s; pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    /* Time picker pills */
    .pill-group { display: flex; gap: 6px; }
    .pill {
      background: #2a2a2a; border: 1px solid #333;
      color: #888; font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 5px 13px; border-radius: 99px; cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover { border-color: #555; color: #ccc; }
    .pill.active { background: #fff; border-color: #fff; color: #000; }
    .setting-disabled { opacity: 0.4; pointer-events: none; }

    /* Toast */
    .inline-toast {
      font-size: 11px; color: #10b981;
      text-align: center; padding: 6px 0; opacity: 0;
      transition: opacity 0.2s; font-weight: 600;
    }
    .inline-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="logo.svg" alt="IntentGuard" style="width:22px;height:22px;object-fit:contain;flex-shrink:0;">
      IntentGuard
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="sessions">Sessions</button>
    <button class="tab-btn" data-tab="history">History</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </div>
  <div class="divider"></div>

  <!-- SESSIONS -->
  <div class="panel active" id="panel-sessions">
    <div class="section-label">Active now</div>
    <div class="card" id="active-list"></div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div class="clear-row">
      <button class="btn-clear" id="clear-btn">Clear history</button>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- SETTINGS -->
  <div class="panel" id="panel-settings">
    <div class="settings-section">
      <div class="section-label">Alert Glow</div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Enable alert glow</div>
          <div class="setting-sub">Red glow flashes around the widget as a reminder</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="glow-toggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row" id="glow-time-row">
        <div>
          <div class="setting-label">Glow after</div>
          <div class="setting-sub">Repeats every interval while session is active</div>
        </div>
        <div class="pill-group">
          <button class="pill" data-mins="5">5m</button>
          <button class="pill active" data-mins="10">10m</button>
          <button class="pill" data-mins="15">15m</button>
        </div>
      </div>

    </div>

    <div class="settings-section">
      <div class="section-label">Monitored sites</div>
      <div class="domain-list" id="domain-list"></div>
      <div class="add-row">
        <input class="add-input" id="add-input" type="text" placeholder="e.g. twitter.com or reddit.com">
        <button class="btn-add" id="add-btn">Add</button>
      </div>
      <div class="hint-text">Enter the base domain only — subdomains are matched automatically.</div>
      <div class="inline-toast" id="save-toast">✓ Saved</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
